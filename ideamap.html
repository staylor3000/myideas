<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IdeaMap — Your thinking space</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: #e2ddd5;
    --text: #1a1814;
    --muted: #9a9389;
    --accent: #2d6a2d;
    --accent2: #c4365a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* TOP BAR */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0; z-index: 100; gap: 16px;
  }
  .topbar-left { display: flex; align-items: center; gap: 18px; min-width: 0; flex: 1; }
  .logo { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; white-space: nowrap; flex-shrink: 0; }
  .logo span { color: var(--muted); font-weight: 300; font-style: italic; }

  /* TOPBAR BREADCRUMB */
  .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12px; flex-wrap: wrap; min-width: 0; }
  .bc-home, .bc-link { color: var(--muted); cursor: pointer; transition: color 0.15s; white-space: nowrap; }
  .bc-home:hover, .bc-link:hover { color: var(--text); }
  .bc-sep { color: var(--border); font-size: 13px; }
  .bc-current { color: var(--text); font-weight: 500; white-space: nowrap; }

  .topbar-actions { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
  .view-toggle { display: flex; background: var(--surface2); border-radius: 8px; padding: 3px; gap: 2px; }
  .view-btn { padding: 5px 14px; border: none; background: none; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
  .view-btn.active { background: var(--border); color: var(--text); }
  .add-btn { background: var(--accent); color: #ffffff; border: none; padding: 8px 18px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .add-btn:hover { background: #3a8a3a; transform: translateY(-1px); }

  /* MAIN LAYOUT */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 14px 10px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  /* hide scrollbar visually but keep scroll */
  .sidebar-scroll::-webkit-scrollbar { width: 0; }

  .sidebar-label {
    font-size: 9px; text-transform: uppercase;
    letter-spacing: 2px; color: var(--muted);
    padding: 2px 8px 8px;
    flex-shrink: 0;
  }

  /* NAV TREE */
  .nav-item {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 10px; border-radius: 7px;
    cursor: pointer; font-size: 12px; color: var(--muted);
    transition: background 0.12s, color 0.12s;
    user-select: none; flex-shrink: 0;
  }
  .nav-item:hover:not(.nav-current) { background: var(--surface2); color: var(--text); }
  .nav-item.nav-in-path { color: var(--text); }
  .nav-item.nav-current  {
    color: var(--text); font-weight: 500;
    cursor: default; background: var(--surface2);
  }
  .nav-item.nav-root { color: var(--muted); font-size: 11px; letter-spacing: 0.3px; }
  .nav-item.nav-root.nav-current { color: var(--text); font-weight: 500; }

  .nav-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .nav-count { margin-left: auto; font-size: 10px; color: var(--muted); background: var(--surface2); padding: 1px 6px; border-radius: 10px; flex-shrink: 0; }
  .nav-item.nav-current .nav-count { background: var(--border); }
  .nav-idea { cursor: default; font-size: 11px; }
  .nav-idea:hover { background: none !important; color: var(--muted) !important; }

  /* Sidebar divider + status section */
  .sidebar-divider { height: 1px; background: var(--border); margin: 8px 0; flex-shrink: 0; }

  .tag-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 7px; cursor: pointer; font-size: 12px; color: var(--muted); transition: all 0.15s; flex-shrink: 0; }
  .tag-item:hover { background: var(--surface2); color: var(--text); }
  .tag-item.active { background: var(--surface2); color: var(--text); }
  .tag-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .tag-count { margin-left: auto; font-size: 10px; color: var(--muted); background: var(--surface2); padding: 1px 6px; border-radius: 10px; }
  .tag-item.active .tag-count { background: var(--border); }

  /* CONTENT */
  .content { flex: 1; overflow: hidden; position: relative; }
  .content-inner { display: flex; flex-direction: column; height: 100%; }

  /* GRID VIEW */
  .grid-view { padding: 24px; overflow-y: auto; height: 100%; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; align-content: start; }
  .idea-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; animation: cardIn 0.3s ease backwards; }
  @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .idea-card:hover { border-color: #c8c0b4; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
  .card-title { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 500; line-height: 1.35; margin-bottom: 8px; color: var(--text); }
  .card-body  { font-size: 11px; color: var(--muted); line-height: 1.6; margin-bottom: 14px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; }
  .card-date { font-size: 10px; color: var(--muted); }
  .card-status { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; padding: 2px 7px; border-radius: 4px; border: 1px solid var(--border); color: var(--muted); }

  /* MAP VIEW */
  .map-view { width: 100%; height: 100%; position: relative; overflow: hidden; cursor: grab; background-image: radial-gradient(circle, var(--border) 1px, transparent 1px); background-size: 28px 28px; }
  .map-view:active { cursor: grabbing; }
  #map-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; will-change: transform, opacity; }

  .map-node { position: absolute; background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 14px 18px 12px; cursor: grab; transition: box-shadow 0.2s, transform 0.2s; min-width: 130px; max-width: 170px; z-index: 2; animation: nodeIn 0.4s ease backwards; box-shadow: 0 2px 8px rgba(0,0,0,0.07); user-select: none; }
  @keyframes nodeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
  .map-node:hover { box-shadow: 0 5px 18px rgba(0,0,0,0.13); z-index: 10; }
  .map-node.central { background: var(--accent); border-color: var(--accent); border-radius: 20px; padding: 16px 22px; cursor: grab; }
  .node-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; }
  .node-title { font-family: 'Fraunces', serif; font-size: 13px; font-weight: 500; line-height: 1.3; color: var(--text); }
  .map-node.central .node-title { font-size: 16px; color: #ffffff; }
  .map-node.selected { box-shadow: 0 0 0 2px var(--accent), 0 5px 18px rgba(0,0,0,0.13); }

  .board-node { min-width: 140px; max-width: 180px; padding: 14px 18px 13px; }
  .board-node .node-title { font-size: 14px; }
  .board-count { font-size: 10px; color: var(--muted); margin-top: 5px; }
  .drill-hint { font-size: 9px; color: var(--muted); margin-top: 7px; opacity: 0.65; border-top: 1px solid var(--border); padding-top: 6px; }

  .map-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: visible; }

  /* ZOOM CONTROLS */
  .zoom-controls { position: absolute; bottom: 18px; right: 18px; z-index: 50; display: flex; flex-direction: column; gap: 4px; }
  .zoom-btn { width: 32px; height: 32px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 17px; line-height: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); transition: all 0.15s; font-family: monospace; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .zoom-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--muted); }

  /* DETAIL PANEL */
  .detail-panel { position: absolute; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; width: 220px; z-index: 15; box-shadow: 0 4px 20px rgba(0,0,0,0.12); animation: nodeIn 0.2s ease backwards; }
  .detail-panel .detail-close { position: absolute; top: 10px; right: 12px; background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; line-height: 1; padding: 0; }
  .detail-panel .detail-close:hover { color: var(--text); }
  .detail-panel .detail-delete { display: block; width: 100%; margin-top: 14px; padding: 7px 0; background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.15s; }
  .detail-panel .detail-delete:hover { border-color: var(--accent2); color: var(--accent2); }
  .detail-panel .detail-title { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 10px; line-height: 1.35; padding-right: 20px; }
  .detail-panel .detail-body  { font-size: 11px; color: var(--muted); line-height: 1.65; margin-bottom: 14px; }
  .detail-meta { display: flex; flex-direction: column; gap: 5px; }
  .detail-meta-row { display: flex; justify-content: space-between; font-size: 10px; }
  .detail-meta-row span:first-child { color: var(--muted); }
  .detail-meta-row span:last-child  { color: var(--text); font-weight: 500; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(26,24,20,0.4); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 480px; transform: translateY(20px); transition: transform 0.2s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-mode-toggle { display: flex; background: var(--surface2); border-radius: 8px; padding: 3px; gap: 2px; margin-bottom: 22px; }
  .mode-tab { flex: 1; padding: 7px 0; border: none; background: none; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
  .mode-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .modal-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; margin-bottom: 20px; color: var(--text); }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 6px; }
  .field input, .field textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; outline: none; transition: border-color 0.15s; resize: none; }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .color-swatches { display: flex; gap: 10px; flex-wrap: wrap; }
  .color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform 0.15s, border-color 0.15s; }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: var(--text); transform: scale(1.1); }
  .tag-select { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag-option { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); font-size: 11px; font-family: 'DM Mono', monospace; cursor: pointer; transition: all 0.15s; color: var(--muted); background: none; }
  .tag-option:hover { border-color: var(--muted); color: var(--text); }
  .tag-option.selected { color: #0e0e10; border-color: transparent; }
  .modal-actions { display: flex; gap: 10px; margin-top: 22px; justify-content: flex-end; }
  .btn-cancel { padding: 9px 20px; border: 1px solid var(--border); background: none; color: var(--muted); border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .btn-cancel:hover { color: var(--text); border-color: var(--muted); }
  .btn-save { padding: 9px 20px; background: var(--accent); color: #ffffff; border: none; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .btn-save:hover { background: #3a8a3a; }

  .search-wrap { padding: 14px 24px 0; flex-shrink: 0; position: relative; }
  .search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px 9px 36px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; outline: none; transition: border-color 0.15s; }
  .search-icon { position: absolute; left: 38px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
  .search-input:focus { border-color: var(--accent); }

  .toast { position: fixed; bottom: 28px; right: 28px; background: var(--text); color: #ffffff; padding: 12px 20px; border-radius: 10px; font-size: 12px; font-family: 'DM Mono', monospace; transform: translateY(60px); opacity: 0; transition: all 0.3s; z-index: 9999; }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* CONNECT MODE */
  .connect-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; padding: 5px 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.3px; }
  .connect-btn:hover { border-color: var(--muted); color: var(--text); }
  .connect-btn.active { background: #e8804a1a; border-color: #e8804a; color: #e8804a; }
  .map-view.connect-mode { cursor: crosshair !important; }
  .map-view.connect-mode .map-node { cursor: crosshair !important; }
  .map-node.connect-source { box-shadow: 0 0 0 2px #e8804a, 0 4px 18px #e8804a33; animation: none; }
  .conn-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 9px; color: #e8804a; background: #e8804a15; border: 1px solid #e8804a30; border-radius: 4px; padding: 2px 5px; margin-top: 5px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">idea<span>map</span></div>
    <nav class="breadcrumb" id="breadcrumb"></nav>
  </div>
  <div class="topbar-actions">
    <!-- view toggle hidden for now
    <div class="view-toggle">
      <button class="view-btn" id="btn-grid" onclick="setView('grid')">grid</button>
      <button class="view-btn active" id="btn-map" onclick="setView('map')">mindmap</button>
    </div>
    -->
    <button class="connect-btn" id="connect-btn" onclick="toggleConnectMode()" title="Connect two nodes across boards">⤳ connect</button>
    <button class="add-btn" id="add-btn" onclick="openModal()">+ new board</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR: always visible, navigation tree + optional status filters -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-scroll">

      <!-- Navigation tree -->
      <div class="sidebar-label">Navigation</div>
      <div id="sidebar-nav"></div>

      <!-- Status filters — shown only when current board has direct ideas -->
      <div id="sidebar-status" style="display:none">
        <div class="sidebar-divider"></div>
        <div class="sidebar-label">Filter</div>
        <div class="tag-item active" onclick="filterTag('all', this)">
          <div class="tag-dot" style="background:#7c7a90"></div>
          all ideas
          <span class="tag-count" id="count-all">0</span>
        </div>
        <div class="sidebar-divider" style="margin:4px 0"></div>
        <div class="tag-item" onclick="filterTag('raw', this)">
          <div class="tag-dot" style="background:#c8c0b4"></div>
          raw
          <span class="tag-count" id="count-raw">0</span>
        </div>
        <div class="tag-item" onclick="filterTag('fleshed', this)">
          <div class="tag-dot" style="background:#9a9389"></div>
          fleshed out
          <span class="tag-count" id="count-fleshed">0</span>
        </div>
        <div class="tag-item" onclick="filterTag('active', this)">
          <div class="tag-dot" style="background:#2d6a2d"></div>
          active
          <span class="tag-count" id="count-active">0</span>
        </div>
      </div>

    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="content-inner">

      <div class="search-wrap" id="search-wrap" style="display:none">
        <span class="search-icon">⌕</span>
        <input class="search-input" placeholder="search ideas..." id="search-input" oninput="searchIdeas(this.value)">
      </div>

      <div class="grid-view" id="grid-view" style="display:none"></div>

      <div class="map-view" id="map-view">
        <div id="map-canvas">
          <svg class="map-lines" id="map-lines"></svg>
        </div>
        <div class="zoom-controls">
          <button class="zoom-btn" onclick="zoomIn()" title="Zoom in">+</button>
          <button class="zoom-btn" onclick="zoomOut()" title="Zoom out">−</button>
          <button class="zoom-btn" onclick="fitToContent()" title="Fit to content" style="font-size:12px">⤢</button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-mode-toggle" id="modal-mode-toggle" style="display:none">
      <button class="mode-tab active" id="tab-board" onclick="setModalMode('board')">new board</button>
      <button class="mode-tab"        id="tab-idea"  onclick="setModalMode('idea')">new idea</button>
    </div>
    <div class="modal-title" id="modal-title-text">create a board</div>

    <div id="board-fields">
      <div class="field">
        <label>Board Name</label>
        <input type="text" id="board-title" placeholder="e.g. Holidays, California 2024...">
      </div>
      <div class="field">
        <label>Colour</label>
        <div class="color-swatches" id="color-swatches"></div>
      </div>
    </div>

    <div id="idea-fields" style="display:none">
      <div class="field">
        <label>Title</label>
        <input type="text" id="idea-title" placeholder="what's the idea?">
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="idea-body" rows="3" placeholder="flesh it out a bit..."></textarea>
      </div>
      <div class="field">
        <label>Status</label>
        <div class="tag-select" id="status-select">
          <button class="tag-option" data-status="raw"    onclick="selectStatus(this)">raw</button>
          <button class="tag-option" data-status="fleshed" onclick="selectStatus(this)">fleshed</button>
          <button class="tag-option" data-status="active"  onclick="selectStatus(this)">active</button>
        </div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">cancel</button>
      <button class="btn-save" id="save-btn" onclick="saveModal()">save board</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────────

const SWATCH_COLORS = [
  '#2d6a2d','#c4365a','#1e6a9a','#b06a10',
  '#6a2d8a','#8a2d2d','#2d7a6a','#6a5a2d',
  '#4a6a9a','#9a4a6a','#1a7a5a','#7a4a1a',
];

// ── Data ───────────────────────────────────────────────────────────────────────

let boards = [
  { id: 'product',  title: 'Product',  color: '#2d6a2d', parentId: null },
  { id: 'design',   title: 'Design',   color: '#c4365a', parentId: null },
  { id: 'tech',     title: 'Tech',     color: '#1e6a9a', parentId: null },
  { id: 'business', title: 'Business', color: '#b06a10', parentId: null },
];

let ideas = [
  { id:1, title:'IdeaMap — the app itself',   body:'A tool for capturing and visualising ideas with tags, mindmaps and smart resurfacing.', tag:'product',  status:'active', date:'today' },
  { id:2, title:'Fridge inventory tracker',   body:"Scan receipts to auto-update what's in your fridge. Alert when things near expiry.",   tag:'product',  status:'fleshed', date:'2d ago' },
  { id:3, title:'Ambient focus sounds',       body:'Generative audio that adapts to your work rhythm — faster when in flow, slower when idle.', tag:'tech', status:'raw', date:'3d ago' },
  { id:4, title:'Type-based card layouts',    body:'Different card shapes for different idea types. Lists look different from concepts.',  tag:'design', status:'fleshed', date:'5d ago' },
  { id:5, title:'AI idea clustering',         body:'Surface hidden connections using embeddings. Group by semantic similarity, not tags.',  tag:'tech', status:'raw', date:'1w ago' },
  { id:6, title:'Idea licensing marketplace', body:'Sell or license your unused ideas to companies looking for innovation.',               tag:'business', status:'raw', date:'1w ago' },
];

// ── Navigation state ───────────────────────────────────────────────────────────

let navigationStack  = [];
let currentView      = 'map';
let currentFilter    = 'all';
let currentModalMode = 'board';
let selStatus = 'raw';
let selColor  = SWATCH_COLORS[0];

let nodePositionsByBoard = {};
let centralNode         = null;
let detailConnectorPath = null;

let connections    = []; // {id, sourceId, targetId} — board IDs or idea IDs
let connectMode    = false;
let connectSrcId   = null;
let connectSrcEl   = null;
let expandedBoards = new Set(); // boards expanded in-place on canvas
let canvasScale    = 1;         // current zoom level

// ── Core helpers ───────────────────────────────────────────────────────────────

function activeBoardId() {
  return navigationStack.length > 0 ? navigationStack[navigationStack.length - 1] : null;
}

function activeBoard() {
  const id = activeBoardId();
  return id ? boards.find(b => b.id === id) || null : null;
}

function currentPositions() {
  const key = activeBoardId() || 'top';
  if (!nodePositionsByBoard[key]) nodePositionsByBoard[key] = {};
  return nodePositionsByBoard[key];
}

function childCount(boardId) {
  return boards.filter(b => b.parentId === boardId).length
       + ideas.filter(i => i.tag === boardId).length;
}

// Return the full navigation stack needed to reach boardId from root
function pathToBoard(boardId) {
  const path = [];
  let cur = boardId;
  while (cur) {
    path.unshift(cur);
    const b = boards.find(x => x.id === cur);
    cur = b ? b.parentId : null;
  }
  return path;
}

// ── Navigation ─────────────────────────────────────────────────────────────────

function navigateToLevel(targetStack) {
  const same = targetStack.length === navigationStack.length
    && targetStack.every((id, i) => id === navigationStack[i]);
  if (same) return;

  closeDetail();
  const canvas = document.getElementById('map-canvas');
  canvas.style.transition = 'opacity 0.25s ease';
  canvas.style.opacity    = '0';

  setTimeout(() => {
    navigationStack = [...targetStack];
    currentFilter   = 'all';
    updateUI();
    renderLevel(true);
  }, 260);
}

function navigateToIndex(i) {
  navigateToLevel(navigationStack.slice(0, i + 1));
}

function navigateToBoard(boardId) {
  navigateToLevel(pathToBoard(boardId));
}

function drillInto(boardId, nodeEl) {
  const canvas = document.getElementById('map-canvas');
  const svg    = document.getElementById('map-lines');
  if (expandedBoards.has(boardId)) {
    expandedBoards.delete(boardId);
    collapseBoard(boardId, canvas, svg);
    updateDrillHint(nodeEl, false);
  } else {
    expandedBoards.add(boardId);
    nodeEl._childPaths = [];
    renderExpanded(boards.find(b => b.id === boardId), nodeEl, canvas, svg);
    updateDrillHint(nodeEl, true);
    renderConnections();
    setTimeout(fitToContent, 80); // zoom out to show new nodes after layout
  }
}

function collapseBoard(boardId, canvas, svg) {
  // Close detail panel if it belongs to an idea inside this board
  const panel = canvas.querySelector('.detail-panel');
  if (panel && ideas.find(i => String(i.id) === panel.dataset.ideaId && i.tag === boardId)) closeDetail();
  // Remove connector paths tagged with this parent board
  svg.querySelectorAll(`[data-parent-board="${boardId}"]`).forEach(p => p.remove());
  // Recursively collapse sub-boards
  boards.filter(b => b.parentId === boardId).forEach(b => {
    if (expandedBoards.has(b.id)) { expandedBoards.delete(b.id); collapseBoard(b.id, canvas, svg); }
    canvas.querySelector(`[data-board-id="${b.id}"]`)?.remove();
  });
  // Remove idea nodes
  ideas.filter(i => i.tag === boardId).forEach(idea => {
    canvas.querySelector(`[data-idea-id="${idea.id}"]`)?.remove();
  });
  renderConnections();
}

function updateDrillHint(nodeEl, isExpanded) {
  const hint = nodeEl.querySelector('.drill-hint');
  if (hint) hint.textContent = isExpanded ? 'double-click to collapse −' : 'double-click to expand +';
}

function renderExpanded(board, boardNode, canvas, svg) {
  const subBoards = boards.filter(b => b.parentId === board.id);
  const subIdeas  = ideas.filter(i => i.tag === board.id);
  const total     = subBoards.length + subIdeas.length;
  const defaults  = getExpandedPositions(total, boardNode);
  if (!nodePositionsByBoard[board.id]) nodePositionsByBoard[board.id] = {};
  const positions = nodePositionsByBoard[board.id];
  if (!boardNode._childPaths) boardNode._childPaths = [];
  let idx = 0;

  subBoards.forEach(b => {
    const subCnt  = boards.filter(x => x.parentId === b.id).length;
    const ideaCnt = ideas.filter(i => i.tag === b.id).length;
    const parts = [];
    if (subCnt)  parts.push(`${subCnt} board${subCnt !== 1 ? 's' : ''}`);
    if (ideaCnt) parts.push(`${ideaCnt} idea${ideaCnt !== 1 ? 's' : ''}`);
    const subtitle = parts.length ? parts.join(', ') : 'empty';
    const pos = positions[b.id] || defaults[idx];
    if (!positions[b.id]) positions[b.id] = { ...pos }; // snapshot default so drags are sticky
    const node = makeBoardNode(b, positions[b.id], subtitle, idx, expandedBoards.has(b.id));
    node.dataset.parentBoard = board.id;
    canvas.appendChild(node);
    const pathEl = makePath(svg, b.color);
    pathEl.dataset.parentBoard = board.id;
    refreshConnector(pathEl, boardNode, node);
    boardNode._childPaths.push({ pathEl, childEl: node });
    node.addEventListener('dblclick', e => { e.stopPropagation(); drillInto(b.id, node); });
    makeDraggable(node, [{ pathEl, otherEl: boardNode, isSource: false }], null, b.id);
    if (expandedBoards.has(b.id)) renderExpanded(b, node, canvas, svg);
    idx++;
  });

  subIdeas.forEach(idea => {
    const pos = positions[idea.id] || defaults[idx];
    if (!pos) return;
    if (!positions[idea.id]) positions[idea.id] = { ...pos }; // snapshot default
    const node = makeNode(false, idea.title, idea.status, positions[idea.id].x, positions[idea.id].y, board.color, idx);
    node.dataset.ideaId    = String(idea.id);
    node.dataset.parentBoard = board.id;
    canvas.appendChild(node);
    const pathEl = makePath(svg, board.color);
    pathEl.dataset.parentBoard = board.id;
    refreshConnector(pathEl, boardNode, node);
    boardNode._childPaths.push({ pathEl, childEl: node });
    makeDraggable(node, [{ pathEl, otherEl: boardNode, isSource: false }], () => {
      if (!connectMode) showDetail(idea.id, node);
    }, String(idea.id));
    idx++;
  });
}

function drillOut() {
  if (navigationStack.length === 0) return;
  navigateToLevel(navigationStack.slice(0, -1));
}

// ── Zoom ───────────────────────────────────────────────────────────────────────

function applyZoom(newScale, anchorX, anchorY) {
  newScale = Math.max(0.2, Math.min(3, newScale));
  const canvas    = document.getElementById('map-canvas');
  const container = document.getElementById('map-view');
  const m         = new DOMMatrix(getComputedStyle(canvas).transform);
  const oldScale  = m.m11 || 1;
  const oldTx = m.m41, oldTy = m.m42;
  const ax = anchorX ?? container.offsetWidth  / 2;
  const ay = anchorY ?? container.offsetHeight / 2;
  // keep the canvas point under the anchor fixed
  const canvasAx = (ax - oldTx) / oldScale;
  const canvasAy = (ay - oldTy) / oldScale;
  canvasScale = newScale;
  canvas.style.transition = 'transform 0.15s ease';
  canvas.style.transform  = `translate(${ax - canvasAx * newScale}px, ${ay - canvasAy * newScale}px) scale(${newScale})`;
  setTimeout(() => { canvas.style.transition = 'none'; }, 160);
}

function zoomIn()  { applyZoom(canvasScale * 1.25); }
function zoomOut() { applyZoom(canvasScale / 1.25); }

function fitToContent() {
  const canvas    = document.getElementById('map-canvas');
  const container = document.getElementById('map-view');
  const nodes     = canvas.querySelectorAll('.map-node');
  if (nodes.length < 2) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    const x = parseInt(n.style.left) || 0, y = parseInt(n.style.top) || 0;
    const w = n.offsetWidth || 160,        h = n.offsetHeight || 80;
    minX = Math.min(minX, x);     minY = Math.min(minY, y);
    maxX = Math.max(maxX, x + w); maxY = Math.max(maxY, y + h);
  });
  const PAD = 60;
  const cW = container.offsetWidth, cH = container.offsetHeight;
  const newScale = Math.min(1.5, Math.max(0.2, Math.min(cW / (maxX - minX + PAD*2), cH / (maxY - minY + PAD*2))));
  const newTx = cW / 2 - (minX + (maxX - minX) / 2) * newScale;
  const newTy = cH / 2 - (minY + (maxY - minY) / 2) * newScale;
  canvasScale = newScale;
  canvas.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
  canvas.style.transform  = `translate(${newTx}px, ${newTy}px) scale(${newScale})`;
  setTimeout(() => { canvas.style.transition = 'none'; }, 420);
}

// ── Connections ────────────────────────────────────────────────────────────────

function toggleConnectMode() {
  connectMode = !connectMode;
  // cancel any pending source selection
  if (connectSrcEl) { connectSrcEl.classList.remove('connect-source'); connectSrcEl = null; }
  connectSrcId = null;
  document.getElementById('connect-btn').classList.toggle('active', connectMode);
  document.getElementById('map-view').classList.toggle('connect-mode', connectMode);
  if (connectMode) showToast('connect mode — click a node to start');
}

function handleConnectClick(el, nodeId) {
  if (!connectSrcId) {
    connectSrcId = nodeId;
    connectSrcEl = el;
    el.classList.add('connect-source');
    showToast('now click the target node');
    return;
  }
  if (connectSrcId === nodeId) {
    connectSrcEl.classList.remove('connect-source');
    connectSrcId = null; connectSrcEl = null;
    return;
  }
  const already = connections.some(c =>
    (c.sourceId === connectSrcId && c.targetId === nodeId) ||
    (c.sourceId === nodeId       && c.targetId === connectSrcId)
  );
  if (!already) {
    connections.push({ id: Date.now(), sourceId: connectSrcId, targetId: nodeId });
    renderConnections();
    showToast('✦ connection made');
  } else {
    showToast('already connected');
  }
  connectSrcEl.classList.remove('connect-source');
  connectSrcId = null; connectSrcEl = null;
}

function renderConnections() {
  const canvas = document.getElementById('map-canvas');
  const svg    = document.getElementById('map-lines');
  svg.querySelectorAll('.cross-conn').forEach(p => p.remove());
  connections.forEach(conn => {
    const fromEl = canvas.querySelector(`[data-board-id="${conn.sourceId}"], [data-idea-id="${conn.sourceId}"]`);
    const toEl   = canvas.querySelector(`[data-board-id="${conn.targetId}"], [data-idea-id="${conn.targetId}"]`);
    if (!fromEl || !toEl) return;
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    p.setAttribute('stroke', '#e8804a');
    p.setAttribute('stroke-width', '2');
    p.setAttribute('stroke-opacity', '0.75');
    p.setAttribute('fill', 'none');
    p.classList.add('cross-conn');
    p.dataset.connId = String(conn.id);
    svg.appendChild(p);
    refreshConnector(p, fromEl, toEl);
  });
}

// ── UI state ───────────────────────────────────────────────────────────────────

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let html = `<span class="bc-home" onclick="navigateToLevel([])">my ideas</span>`;
  navigationStack.forEach((boardId, i) => {
    const b = boards.find(x => x.id === boardId);
    const isLast = i === navigationStack.length - 1;
    html += `<span class="bc-sep">›</span>`;
    if (isLast) {
      html += `<span class="bc-current">${b ? b.title : boardId}</span>`;
    } else {
      html += `<span class="bc-link" onclick="navigateToIndex(${i})">${b ? b.title : boardId}</span>`;
    }
  });
  bc.innerHTML = html;
}

// Build the sidebar nav tree HTML (recursive)
function buildNavTree(parentId, depth) {
  const children = boards.filter(b => b.parentId === parentId);
  if (!children.length) return '';
  let html = '';
  children.forEach(board => {
    const isCurrent = activeBoardId() === board.id;
    const isInPath  = !isCurrent && navigationStack.includes(board.id);
    const count     = childCount(board.id);
    const indent    = 10 + depth * 14;
    let cls = 'nav-item';
    if (isCurrent)  cls += ' nav-current';
    else if (isInPath) cls += ' nav-in-path';
    // Left accent border for in-path and current
    const borderStyle = (isCurrent || isInPath)
      ? `border-left: 2px solid ${board.color}; padding-left: ${indent - 2}px;`
      : `padding-left: ${indent}px;`;
    const onclick = isCurrent ? '' : `onclick="navigateToBoard('${board.id}')"`;
    html += `<div class="${cls}" style="${borderStyle}" ${onclick}>
      <div class="nav-dot" style="background:${board.color}; opacity:${(isCurrent||isInPath) ? 1 : 0.55}"></div>
      <span>${board.title}</span>
      ${count > 0 ? `<span class="nav-count">${count}</span>` : ''}
    </div>`;
    // Expand sub-boards for ancestors in path AND for the current board
    if (isInPath || isCurrent) {
      html += buildNavTree(board.id, depth + 1);
    }
    // Show idea leaves inside the current board
    if (isCurrent) {
      html += buildNavIdeas(board.id, depth + 1);
    }
  });
  return html;
}

// Render idea leaf items for a board (shown inside the current board in the nav)
function buildNavIdeas(boardId, depth) {
  const boardIdeas = ideas.filter(i => i.tag === boardId);
  if (!boardIdeas.length) return '';
  const board  = boards.find(b => b.id === boardId);
  const col    = board ? board.color : '#7c7a90';
  const indent = 10 + depth * 14;
  return boardIdeas.map(idea => `
    <div class="nav-item nav-idea" style="padding-left:${indent}px">
      <div class="nav-dot" style="background:${col}; opacity:0.4; width:5px; height:5px"></div>
      <span style="opacity:0.7">${idea.title}</span>
    </div>
  `).join('');
}

function renderSidebarNav() {
  const el = document.getElementById('sidebar-nav');
  if (!el) return;

  const isAtTop = navigationStack.length === 0;

  // Root "my ideas" item
  const rootCls = `nav-item nav-root${isAtTop ? ' nav-current' : ''}`;
  const rootOnclick = isAtTop ? '' : `onclick="navigateToLevel([])"`;
  let html = `<div class="${rootCls}" ${rootOnclick}>
    <div class="nav-dot" style="background:var(--accent); opacity:${isAtTop ? 1 : 0.55}"></div>
    <span>my ideas</span>
  </div>`;

  html += buildNavTree(null, 1);
  el.innerHTML = html;

  // Show status section only when current board has direct ideas
  const boardId = activeBoardId();
  const hasIdeas = boardId && ideas.some(i => i.tag === boardId);
  document.getElementById('sidebar-status').style.display = hasIdeas ? 'block' : 'none';
}

function updateCounts() {
  const boardId = activeBoardId();
  if (!boardId) return;
  const boardIdeas = ideas.filter(i => i.tag === boardId);
  const subCount   = boards.filter(b => b.parentId === boardId).length;
  const allEl = document.getElementById('count-all');
  if (allEl) allEl.textContent = boardIdeas.length + subCount;
  ['raw','fleshed','active'].forEach(s => {
    const el = document.getElementById('count-' + s);
    if (el) el.textContent = boardIdeas.filter(i => i.status === s).length;
  });
}

function updateUI() {
  const addBtn = document.getElementById('add-btn');
  const board  = activeBoard();

  updateBreadcrumb();
  renderSidebarNav();

  addBtn.textContent = board ? '+ add' : '+ new board';

  // Reset status filter active state
  document.querySelectorAll('.tag-item').forEach(x => x.classList.remove('active'));
  const allItem = document.querySelector('.tag-item');
  if (allItem) allItem.classList.add('active');

  updateCounts();
}

// ── View ───────────────────────────────────────────────────────────────────────

function setView(v) {
  currentView = v;
  document.getElementById('btn-grid')?.classList.toggle('active', v === 'grid');
  document.getElementById('btn-map')?.classList.toggle('active',  v === 'map');
  document.getElementById('grid-view').style.display   = v === 'grid' ? 'grid'  : 'none';
  document.getElementById('map-view').style.display    = v === 'map'  ? 'block' : 'none';
  document.getElementById('search-wrap').style.display = v === 'grid' ? 'block' : 'none';
  if (v === 'map') renderMap();
  else renderGrid();
}

function filterTag(tag, el) {
  currentFilter = tag;
  document.querySelectorAll('.tag-item').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  if (currentView === 'map') renderMap();
  else renderGrid();
}

function searchIdeas(q) { renderGrid(q.toLowerCase()); }

// ── Grid ───────────────────────────────────────────────────────────────────────

function renderGrid(query = '') {
  const container = document.getElementById('grid-view');
  const boardId   = activeBoardId();
  let filtered = ideas;
  if (boardId) filtered = filtered.filter(i => i.tag === boardId);
  if (currentFilter !== 'all') filtered = filtered.filter(i => i.status === currentFilter);
  if (query) filtered = filtered.filter(i =>
    i.title.toLowerCase().includes(query) || i.body.toLowerCase().includes(query)
  );
  container.innerHTML = filtered.map((idea, idx) => {
    const b   = boards.find(x => x.id === idea.tag);
    const col = b ? b.color : '#7c7a90';
    return `<div class="idea-card" style="animation-delay:${idx*0.05}s">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${col};border-radius:12px 12px 0 0"></div>
      <div class="card-title">${idea.title}</div>
      <div class="card-body">${idea.body}</div>
      <div class="card-footer">
        <span class="card-date">${idea.date}</span>
        <span class="card-status">${idea.status}</span>
      </div>
    </div>`;
  }).join('');
}

// ── Canvas helpers ─────────────────────────────────────────────────────────────

function getDefaultPositions(count, cx, cy, radius) {
  const out = [];
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * 2 * Math.PI - Math.PI / 2;
    const r = radius + (i % 3 === 1 ? 50 : i % 3 === 2 ? 25 : 0);
    out.push({ x: cx + Math.cos(angle) * r - 80, y: cy + Math.sin(angle) * r - 40 });
  }
  return out;
}

// Fan expanded children outward from canvas centre in the same direction as their parent board node.
// They appear on the next concentric ring beyond the board node.
function getExpandedPositions(count, boardNode) {
  if (!centralNode || count === 0) {
    const bx = parseInt(boardNode.style.left), by = parseInt(boardNode.style.top);
    return getDefaultPositions(count, bx, by, 180);
  }
  const [cx, cy] = nodeCenter(centralNode);
  const [bx, by] = nodeCenter(boardNode);
  const angle     = Math.atan2(by - cy, bx - cx);
  const boardDist = Math.sqrt((bx-cx)**2 + (by-cy)**2);
  const ringRadius = boardDist + 230;
  const fanSpread  = Math.min(Math.PI * 0.72, Math.max(0.45, count * 0.45));
  const out = [];
  for (let i = 0; i < count; i++) {
    const t = count === 1 ? 0 : (i / (count - 1) - 0.5);
    const a = angle + t * fanSpread;
    out.push({ x: cx + Math.cos(a) * ringRadius - 80, y: cy + Math.sin(a) * ringRadius - 40 });
  }
  return out;
}

function nodeCenter(el) {
  return [
    parseInt(el.style.left) + (el.offsetWidth  || 160) / 2,
    parseInt(el.style.top)  + (el.offsetHeight || 56)  / 2,
  ];
}

function refreshConnector(pathEl, fromEl, toEl) {
  const [x1,y1] = nodeCenter(fromEl), [x2,y2] = nodeCenter(toEl);
  const dx = x2-x1, dy = y2-y1, len = Math.sqrt(dx*dx+dy*dy)||1;
  const arc = Math.min(len*0.18, 55);
  const cx = (x1+x2)/2 + (-dy/len)*arc;
  const cy = (y1+y2)/2 + ( dx/len)*arc;
  pathEl.setAttribute('d', `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}`);
}

function makePath(svg, col) {
  const p = document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('stroke', col || '#c8c0b4');
  p.setAttribute('stroke-width', '1.5');
  p.setAttribute('stroke-opacity', '0.45');
  p.setAttribute('stroke-dasharray', '5 4');
  p.setAttribute('fill', 'none');
  svg.appendChild(p);
  return p;
}

function makeDraggable(el, connectedPaths, onClick, nodeId) {
  el.style.cursor = 'grab';
  el.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    e.stopPropagation(); e.preventDefault();
    const sx = e.clientX, sy = e.clientY;
    const sl = parseInt(el.style.left), st = parseInt(el.style.top);
    let dragged = false;
    const origZIndex = el.style.zIndex;
    el.style.cursor = 'grabbing'; el.style.zIndex = 20;

    function onMove(e) {
      const dx = e.clientX-sx, dy = e.clientY-sy;
      if (!dragged && (Math.abs(dx)>3||Math.abs(dy)>3)) dragged = true;
      el.style.left = (sl+dx)+'px'; el.style.top = (st+dy)+'px';
      connectedPaths.forEach(({ pathEl, otherEl, isSource }) =>
        isSource ? refreshConnector(pathEl, el, otherEl) : refreshConnector(pathEl, otherEl, el)
      );
      // Keep child connectors live when dragging an expanded board node
      if (el._childPaths && el._childPaths.length) {
        el._childPaths.forEach(({ pathEl, childEl }) => refreshConnector(pathEl, el, childEl));
      }
      svg_liveConnUpdate(el);
    }
    function onUp() {
      el.style.cursor = 'grab'; el.style.zIndex = origZIndex;
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      const posKey     = el.dataset.ideaId || el.dataset.boardId;
      const parentBoard = el.dataset.parentBoard;
      if (posKey) {
        const store = parentBoard
          ? (nodePositionsByBoard[parentBoard] || (nodePositionsByBoard[parentBoard] = {}))
          : currentPositions();
        store[posKey] = { x: parseInt(el.style.left), y: parseInt(el.style.top) };
      }
      if (!dragged) {
        if (connectMode && nodeId) handleConnectClick(el, nodeId);
        else if (onClick) onClick();
      }
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function svg_liveConnUpdate(movedEl) {
  const id = movedEl.dataset.ideaId || movedEl.dataset.boardId;
  if (!id) return;
  const svg = document.getElementById('map-lines');
  svg.querySelectorAll('.cross-conn').forEach(p => {
    const cid = p.dataset.connId;
    const conn = connections.find(c => String(c.id) === cid);
    if (!conn) return;
    const canvas = document.getElementById('map-canvas');
    const fromEl = canvas.querySelector(`[data-board-id="${conn.sourceId}"], [data-idea-id="${conn.sourceId}"]`);
    const toEl   = canvas.querySelector(`[data-board-id="${conn.targetId}"], [data-idea-id="${conn.targetId}"]`);
    if (fromEl && toEl) refreshConnector(p, fromEl, toEl);
  });
}

// ── Node factories ─────────────────────────────────────────────────────────────

function makeNode(isCentral, title, label, x, y, col, idx) {
  const el = document.createElement('div');
  el.className = 'map-node' + (isCentral ? ' central' : '');
  el.style.left = x+'px'; el.style.top = y+'px';
  el.style.animationDelay = ((idx||0)*0.06+0.1)+'s';
  if (!isCentral && col) el.style.borderTop = `2px solid ${col}`;
  el.innerHTML = `
    ${label ? `<div class="node-label" style="color:${col||'var(--muted)'}">${label}</div>` : ''}
    <div class="node-title">${title}</div>
  `;
  return el;
}

function makeBoardNode(board, pos, subtitle, idx, isExpanded) {
  const el = document.createElement('div');
  el.className = 'map-node board-node';
  el.style.left = pos.x+'px'; el.style.top = pos.y+'px';
  el.style.borderTop = `3px solid ${board.color}`;
  el.style.animationDelay = (idx*0.07+0.1)+'s';
  el.dataset.boardId = board.id;
  el.innerHTML = `
    <div class="node-title">${board.title}</div>
    <div class="board-count">${subtitle}</div>
    <div class="drill-hint">${isExpanded ? 'double-click to collapse −' : 'double-click to expand +'}</div>
  `;
  return el;
}

// ── Render ─────────────────────────────────────────────────────────────────────

function _prepCanvas(animate) {
  const canvas = document.getElementById('map-canvas');
  const svg    = document.getElementById('map-lines');
  canvas.style.transition = 'none'; canvas.style.transform = canvasScale !== 1 ? `scale(${canvasScale})` : ''; canvas.style.opacity = '';
  svg.style.transition    = ''; svg.style.opacity = '';
  canvas.querySelectorAll('.map-node, .detail-panel').forEach(n => n.remove());
  if (detailConnectorPath) { detailConnectorPath.remove(); detailConnectorPath = null; }
  svg.innerHTML = '';
  if (animate) {
    canvas.style.opacity = '0';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      canvas.style.transition = 'opacity 0.32s ease';
      canvas.style.opacity    = '1';
    }));
  }
  return { canvas, svg };
}

function renderMap() { renderLevel(); }

function renderLevel(animate) {
  const boardId = activeBoardId();
  const board   = activeBoard();
  const { canvas, svg } = _prepCanvas(animate);
  const container = document.getElementById('map-view');
  const W = container.offsetWidth, H = container.offsetHeight;
  const cx = W/2-90, cy = H/2-50;

  centralNode = makeNode(true, board ? board.title : 'my ideas', '', cx, cy, '', 0);
  if (board) { centralNode.style.background = board.color; centralNode.style.borderColor = board.color; }
  canvas.appendChild(centralNode);

  const childBoards  = boards.filter(b => b.parentId === boardId);
  const childIdeas   = boardId ? ideas.filter(i => i.tag === boardId) : [];
  const visibleIdeas = currentFilter !== 'all' ? childIdeas.filter(i => i.status === currentFilter) : childIdeas;

  const total      = childBoards.length + visibleIdeas.length;
  const positions  = currentPositions();
  const defaults   = getDefaultPositions(total, cx, cy, 240);
  const centralPaths = [];
  let nodeIdx = 0;

  childBoards.forEach(b => {
    const subCnt  = boards.filter(x => x.parentId === b.id).length;
    const ideaCnt = ideas.filter(i => i.tag === b.id).length;
    const parts = [];
    if (subCnt)  parts.push(`${subCnt} board${subCnt !== 1 ? 's' : ''}`);
    if (ideaCnt) parts.push(`${ideaCnt} idea${ideaCnt !== 1 ? 's' : ''}`);
    const subtitle = parts.length ? parts.join(', ') : 'empty';

    const pos = positions[b.id] || defaults[nodeIdx];
    if (!positions[b.id]) positions[b.id] = pos;
    const node = makeBoardNode(b, pos, subtitle, nodeIdx, expandedBoards.has(b.id));
    canvas.appendChild(node);

    const pathEl = makePath(svg, b.color);
    refreshConnector(pathEl, centralNode, node);
    centralPaths.push({ pathEl, otherEl: node, isSource: true });

    node.addEventListener('dblclick', e => { e.stopPropagation(); drillInto(b.id, node); });
    makeDraggable(node, [{ pathEl, otherEl: centralNode, isSource: false }], null, b.id);

    // Re-expand if this board was already open
    if (expandedBoards.has(b.id)) {
      node._childPaths = [];
      renderExpanded(b, node, canvas, svg);
    }
    nodeIdx++;
  });

  const col = board ? board.color : '#7c7a90';
  visibleIdeas.forEach(idea => {
    const pos = positions[idea.id] || defaults[nodeIdx];
    if (!pos) return;
    if (!positions[idea.id]) positions[idea.id] = pos;
    const node = makeNode(false, idea.title, idea.status, pos.x, pos.y, col, nodeIdx);
    node.dataset.ideaId = idea.id;
    canvas.appendChild(node);

    const pathEl = makePath(svg, col);
    refreshConnector(pathEl, centralNode, node);
    centralPaths.push({ pathEl, otherEl: node, isSource: true });
    makeDraggable(node, [{ pathEl, otherEl: centralNode, isSource: false }], () => {
      if (!connectMode) showDetail(idea.id, node);
    }, String(idea.id));
    nodeIdx++;
  });

  makeDraggable(centralNode, centralPaths, null);
  renderConnections();
}

// ── Detail panel ───────────────────────────────────────────────────────────────

function showDetail(id, nodeEl) {
  const idea = ideas.find(i => i.id === id);
  if (!idea) return;
  const b   = boards.find(x => x.id === idea.tag);
  const col = b ? b.color : '#7c7a90';
  const canvas = document.getElementById('map-canvas');
  const svg    = document.getElementById('map-lines');

  const existing = canvas.querySelector('.detail-panel');
  if (existing) {
    existing.remove();
    if (detailConnectorPath) { detailConnectorPath.remove(); detailConnectorPath = null; }
    document.querySelectorAll('.map-node.selected').forEach(n => n.classList.remove('selected'));
    if (existing.dataset.ideaId === String(id)) return;
  }

  document.querySelectorAll('.map-node.selected').forEach(n => n.classList.remove('selected'));
  nodeEl.classList.add('selected');

  const [ncx,ncy] = nodeCenter(nodeEl), [ccx,ccy] = nodeCenter(centralNode);
  const dx = ncx-ccx, dy = ncy-ccy, len = Math.sqrt(dx*dx+dy*dy)||1;
  const DIST = 210;
  const px = ncx + (dx/len)*DIST - 110, py = ncy + (dy/len)*DIST - 50;

  const panel = document.createElement('div');
  panel.className = 'detail-panel';
  panel.dataset.ideaId = String(id);
  panel.style.left = px+'px'; panel.style.top = py+'px';
  panel.innerHTML = `
    <button class="detail-close" onclick="closeDetail()">×</button>
    <div class="detail-title">${idea.title}</div>
    <div class="detail-body">${idea.body}</div>
    <div class="detail-meta">
      <div class="detail-meta-row"><span>status</span><span>${idea.status}</span></div>
      <div class="detail-meta-row"><span>added</span><span>${idea.date}</span></div>
    </div>
    <button class="detail-delete" onclick="deleteIdea(${id})">delete idea</button>
  `;
  canvas.appendChild(panel);

  detailConnectorPath = makePath(svg, col);
  refreshConnector(detailConnectorPath, nodeEl, panel);

  makeDraggable(panel, [{ pathEl: detailConnectorPath, otherEl: nodeEl, isSource: true }], null, null);

  requestAnimationFrame(() => {
    const container = document.getElementById('map-view');
    const MARGIN = 16;
    const cW = container.offsetWidth, cH = container.offsetHeight;
    const matrix = new DOMMatrix(getComputedStyle(canvas).transform);
    const curX = matrix.m41, curY = matrix.m42;
    const pL = parseFloat(panel.style.left)+curX, pT = parseFloat(panel.style.top)+curY;
    const pR = pL+panel.offsetWidth, pB = pT+panel.offsetHeight;
    let shiftX = 0, shiftY = 0;
    if (pR > cW-MARGIN) shiftX = cW-MARGIN-pR;
    if (pL < MARGIN)    shiftX = MARGIN-pL;
    if (pB > cH-MARGIN) shiftY = cH-MARGIN-pB;
    if (pT < MARGIN)    shiftY = MARGIN-pT;
    if (shiftX || shiftY) {
      canvas.style.transition = 'transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      canvas.style.transform  = `translate(${curX+shiftX}px, ${curY+shiftY}px)`;
    }
  });
}

function closeDetail() {
  const panel = document.querySelector('.detail-panel');
  if (panel) panel.remove();
  if (detailConnectorPath) { detailConnectorPath.remove(); detailConnectorPath = null; }
  document.querySelectorAll('.map-node.selected').forEach(n => n.classList.remove('selected'));
}

function deleteIdea(id) {
  ideas = ideas.filter(i => i.id !== id);
  delete currentPositions()[id];
  closeDetail();
  updateCounts();
  renderSidebarNav();
  if (currentView === 'map') renderMap();
  else renderGrid();
  showToast('idea deleted');
}

// ── Modal ──────────────────────────────────────────────────────────────────────

function renderColorSwatches() {
  document.getElementById('color-swatches').innerHTML = SWATCH_COLORS.map(c =>
    `<div class="color-swatch${c === selColor ? ' selected' : ''}" style="background:${c}" data-color="${c}" onclick="selectColor(this)"></div>`
  ).join('');
}

function selectColor(el) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  selColor = el.dataset.color;
}

function selectStatus(btn) {
  document.querySelectorAll('#status-select .tag-option').forEach(b => { b.classList.remove('selected'); b.style.background = ''; b.style.color = ''; });
  btn.classList.add('selected');
  btn.style.background = '#2d6a2d'; btn.style.color = '#ffffff';
  selStatus = btn.dataset.status;
}

function setModalMode(mode) {
  currentModalMode = mode;
  document.getElementById('board-fields').style.display = mode === 'board' ? 'block' : 'none';
  document.getElementById('idea-fields').style.display  = mode === 'idea'  ? 'block' : 'none';
  document.getElementById('modal-title-text').textContent = mode === 'board' ? 'create a board' : 'capture an idea';
  document.getElementById('save-btn').textContent         = mode === 'board' ? 'save board'     : 'save idea';
  document.getElementById('tab-board')?.classList.toggle('active', mode === 'board');
  document.getElementById('tab-idea')?.classList.toggle('active',  mode === 'idea');
}

function openModal() {
  const isTopLevel = activeBoardId() === null;
  document.getElementById('modal-mode-toggle').style.display = isTopLevel ? 'none' : 'flex';
  setModalMode('board');
  if (!isTopLevel) { const b = activeBoard(); if (b) selColor = b.color; }
  renderColorSwatches();
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('board-title').focus(), 200);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('board-title').value = '';
  document.getElementById('idea-title').value  = '';
  document.getElementById('idea-body').value   = '';
  document.querySelectorAll('#status-select .tag-option').forEach(b => { b.classList.remove('selected'); b.style.background = ''; b.style.color = ''; });
  selStatus = 'raw';
}

function closeModalOutside(e) { if (e.target.id === 'modal') closeModal(); }

function saveModal() {
  if (currentModalMode === 'board') saveBoard();
  else saveIdea();
}

function saveBoard() {
  const title = document.getElementById('board-title').value.trim();
  if (!title) { showToast('⚠ add a name first'); return; }
  const id = title.toLowerCase().replace(/[^a-z0-9]+/g, '-') + '-' + Date.now();
  boards.push({ id, title, color: selColor, parentId: activeBoardId() });
  delete nodePositionsByBoard[activeBoardId() || 'top'];
  closeModal();
  if (currentView === 'map') renderMap();
  updateUI();
  showToast('✦ board created');
}

function saveIdea() {
  const title = document.getElementById('idea-title').value.trim();
  if (!title) { showToast('⚠ add a title first'); return; }
  ideas.unshift({ id: Date.now(), title, body: document.getElementById('idea-body').value.trim() || 'No notes yet.', tag: activeBoardId(), status: selStatus || 'raw', date: 'just now' });
  if (currentView === 'map') renderMap();
  else renderGrid();
  closeModal();
  updateUI();
  showToast('✦ idea saved');
}

// ── Canvas pan ─────────────────────────────────────────────────────────────────

(function() {
  const mapView = document.getElementById('map-view');
  const canvas  = document.getElementById('map-canvas');
  let panStart = null, panOrigin = null;
  mapView.addEventListener('mousedown', e => {
    const t = e.target;
    if (t === mapView || t === canvas || t.classList.contains('map-lines') || t.tagName === 'svg') {
      closeDetail();
      panStart = { x: e.clientX, y: e.clientY };
      const m  = new DOMMatrix(getComputedStyle(canvas).transform);
      panOrigin = { x: m.m41, y: m.m42 };
    }
  });
  document.addEventListener('mousemove', e => {
    if (!panStart) return;
    const dx = e.clientX-panStart.x, dy = e.clientY-panStart.y;
    canvas.style.transition = 'none';
    canvas.style.transform  = `translate(${panOrigin.x+dx}px, ${panOrigin.y+dy}px) scale(${canvasScale})`;
  });
  document.addEventListener('mouseup', () => { panStart = null; panOrigin = null; });
  mapView.addEventListener('wheel', e => {
    e.preventDefault();
    const rect  = mapView.getBoundingClientRect();
    const delta = e.deltaY > 0 ? 1/1.12 : 1.12;
    applyZoom(canvasScale * delta, e.clientX - rect.left, e.clientY - rect.top);
  }, { passive: false });
})();

// ── Keyboard ───────────────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('modal').classList.contains('open')) closeModal();
    else if (document.querySelector('.detail-panel')) closeDetail();
    else if (activeBoardId() !== null) drillOut();
  }
});

// ── Toast ──────────────────────────────────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Init ───────────────────────────────────────────────────────────────────────

updateUI();
setView('map');
</script>
</body>
